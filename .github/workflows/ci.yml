name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      AUTH_MODE: anonymous
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --workspace

  web:
    runs-on: ubuntu-latest
    env:
      AUTH_MODE: anonymous
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint:a11y
      - run: npx tsc --noEmit

  e2e:
    runs-on: ubuntu-latest
    needs: [rust, web]
    env:
      AUTH_MODE: anonymous
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps
      - name: Start backend API
        run: |
          cargo run --quiet > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
      - name: Wait for backend readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become ready in time"
          exit 1
      - name: Build web app
        working-directory: web
        run: npm run build
      - name: Start web app
        working-directory: web
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/web.log 2>&1 &
          echo $! > /tmp/web.pid
      - name: Wait for web readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Web app did not become ready in time"
          exit 1
      - name: Run Playwright tests
        working-directory: web
        env:
          CI: "true"
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8080
        run: npm run test:e2e:ci
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
      - name: Stop background services
        if: always()
        run: |
          if [ -f /tmp/web.pid ]; then kill "$(cat /tmp/web.pid)" || true; fi
          if [ -f /tmp/api.pid ]; then kill "$(cat /tmp/api.pid)" || true; fi

  bench:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Compile benchmarks
        run: cargo bench --no-run
