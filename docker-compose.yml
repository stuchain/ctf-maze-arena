# Local API stack. Copy .env.example to .env and adjust if needed.
#
# DATABASE_URL=sqlite:./data/ctf_maze.db matches the volume below (/app/data in the container).
#
# Bind mounts: Docker Desktop maps host paths differently on Windows vs macOS; use a project-
# relative ./data path for portability. On Windows, ensure the drive is shared in Docker settings.

services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: "8080"
    volumes:
      - ./data:/app/data

  web:
    build:
      context: web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api
